<body>

<header class="cabecera">
    <div class="logo">
        <h1>jose villa</h1>
        <span>photographer</span>
    </div>

    <div class="menu-icon" id="menuIcon">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
    </div>

    <nav class="nav-menu" id="navMenu">
        <ul>

<section>

    <div class="carrusel-fotos" id="cinta">
        <img src="imagenes/foto1.jpg" alt="boda1">
        <img src="imagenes/foto2.jpg" alt="boda2">
        <img src="imagenes/foto3.jpg" alt="boda3">

<button class="btn anterior" onclick="mover(-1)">&#10094;</button>

</div>

    <p>Name *</p>

  <div class="info">
    <p>PHONE</p>
    <p><b>+1 805.688.8654</b></p>
    <p>EMAIL</p>
    <p><b>jose@josevilla.com</b></p>
